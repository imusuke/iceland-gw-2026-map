<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f5f55" />
  <title>アイスランド GW 2026 旅の実記録</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="stylesheet" href="/styles/site.css?v=20260510d" />
  <link rel="stylesheet" href="/styles/record.css?v=20260510d" />
</head>
<body>
  <main class="record-shell">
    <header class="record-hero">
      <div class="hero-copy">
        <p class="hero-eyebrow" id="record-eyebrow"></p>
        <h1 id="record-title"></h1>
        <p class="hero-lead" id="record-lead"></p>
      </div>

      <div class="hero-meta">
        <p class="hero-meta-item" id="record-period"></p>
        <p class="hero-meta-item" id="record-day-count"></p>
        <p class="hero-meta-item" id="record-highlight-count"></p>
      </div>

      <nav class="page-nav" aria-label="主なページ">
        <a class="action-button secondary" id="record-nav-map" href="/map"></a>
        <a class="action-button secondary" id="record-nav-spots" href="/spots"></a>
        <a class="action-button secondary" id="record-nav-history" href="/history"></a>
        <a class="action-button current" id="record-nav-record" href="/record" aria-current="page"></a>
      </nav>

      <nav class="hero-jumps record-day-jumps" id="record-day-jumps" aria-label="日別ナビゲーション"></nav>
    </header>

    <section class="record-note-panel" aria-labelledby="record-note-title">
      <div class="section-heading">
        <p class="section-eyebrow" id="record-note-eyebrow"></p>
        <h2 id="record-note-title"></h2>
      </div>
      <p class="record-note-copy" id="record-note"></p>
    </section>

    <section class="record-days" id="record-days" aria-label="日別ギャラリー"></section>
  </main>

  <script src="/data/travel-record.js?v=20260510d"></script>
  <script src="/scripts/record-app.js?v=20260510d"></script>
</body>
</html>
