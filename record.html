<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f5f55" />
  <title>アイスランド GW 2026 旅の実記録</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="stylesheet" href="/styles/site.css" />
  <style>
    body {
      margin: 0;
      background: linear-gradient(180deg, #f5fbfa 0%, #eef6f4 100%);
      color: #143a36;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    .record-placeholder {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 20px 72px;
    }

    .record-card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(20, 58, 54, 0.1);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 40px rgba(20, 58, 54, 0.08);
    }

    .record-card h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 6vw, 3rem);
      line-height: 1.1;
    }

    .record-card p {
      margin: 0 0 14px;
      line-height: 1.8;
    }

    .record-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    @media (max-width: 720px) {
      .record-placeholder {
        padding: 28px 16px 48px;
      }

      .record-card {
        padding: 22px 18px;
      }
    }
  </style>
</head>
<body>
  <main class="record-placeholder">
    <nav class="page-nav" aria-label="ページ移動">
      <a class="action-button secondary" href="/map">ルートマップ</a>
      <a class="action-button secondary" href="/spots">スポット詳細</a>
      <a class="action-button secondary" href="/history">アイスランド史</a>
      <span class="action-button current" aria-current="page">旅の実記録</span>
    </nav>

    <section class="record-card" aria-labelledby="record-title">
      <p class="section-eyebrow">旅の実記録</p>
      <h1 id="record-title">実記録ページを調整中です</h1>
      <p>
        取り込み元の旅メモ自体に文字化けが入っていたため、いまはこのページだけ一時的に非表示へ切り替えています。
      </p>
      <p>
        ルートマップ、スポット詳細、アイスランド史は正常な日本語表示へ戻してあります。実記録ページも、元データをきれいな状態で再取得できしだい組み直します。
      </p>

      <div class="record-actions">
        <a class="action-button secondary" href="/map">ルートマップへ戻る</a>
        <a class="action-button secondary" href="/spots">スポット詳細を見る</a>
        <a class="action-button secondary" href="/history">アイスランド史を見る</a>
      </div>
    </section>
  </main>
</body>
</html>
