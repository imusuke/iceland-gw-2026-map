<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f5f55" />
  <title>アイスランド GW 2026 旅の実記録</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="stylesheet" href="/styles/site.css?v=20260510g" />
  <link rel="stylesheet" href="/styles/record.css?v=20260510g" />
</head>
<body>
  <main class="record-shell">
    <header class="record-hero">
      <div class="hero-copy">
        <p class="hero-eyebrow" id="record-eyebrow"></p>
        <h1 id="record-title"></h1>
        <p class="hero-lead" id="record-lead"></p>
      </div>

      <div class="hero-meta">
        <p class="hero-meta-item" id="record-period"></p>
        <p class="hero-meta-item" id="record-day-count"></p>
        <p class="hero-meta-item" id="record-highlight-count"></p>
      </div>

      <div class="record-hero-actions">
        <button class="action-button" type="button" id="record-open-slideshow" data-record-action="open-slideshow"></button>
      </div>

      <nav class="page-nav" aria-label="主なページ">
        <a class="action-button secondary" id="record-nav-map" href="/map"></a>
        <a class="action-button secondary" id="record-nav-spots" href="/spots"></a>
        <a class="action-button secondary" id="record-nav-history" href="/history"></a>
        <a class="action-button current" id="record-nav-record" href="/record" aria-current="page"></a>
      </nav>

      <nav class="hero-jumps record-day-jumps" id="record-day-jumps" aria-label="日別ナビゲーション"></nav>
    </header>

    <section class="record-note-panel" aria-labelledby="record-note-title">
      <div class="section-heading">
        <p class="section-eyebrow" id="record-note-eyebrow"></p>
        <h2 id="record-note-title"></h2>
      </div>
      <p class="record-note-copy" id="record-note"></p>
    </section>

    <section class="record-days" id="record-days" aria-label="日別ギャラリー"></section>
  </main>

  <div class="record-slideshow" id="record-slideshow" hidden aria-hidden="true">
    <div class="record-slideshow-backdrop" data-record-close="true"></div>
    <section class="record-slideshow-dialog" role="dialog" aria-modal="true" aria-labelledby="record-slideshow-title">
      <div class="record-slideshow-toolbar">
        <div class="record-slideshow-toolbar-copy">
          <p class="record-slideshow-kicker" id="record-slideshow-kicker"></p>
          <p class="record-slideshow-counter" id="record-slideshow-counter"></p>
        </div>
        <div class="record-slideshow-toolbar-actions">
          <button class="action-button secondary" type="button" id="record-slideshow-prev" data-record-action="prev-slide"></button>
          <button class="action-button secondary" type="button" id="record-slideshow-next" data-record-action="next-slide"></button>
          <button class="action-button secondary" type="button" id="record-slideshow-close" data-record-action="close-slideshow"></button>
        </div>
      </div>

      <div class="record-slideshow-body">
        <figure class="record-slideshow-figure">
          <img class="record-slideshow-image" id="record-slideshow-image" alt="" />
        </figure>

        <div class="record-slideshow-copy">
          <div class="record-slideshow-meta" id="record-slideshow-meta"></div>
          <h2 class="record-slideshow-title" id="record-slideshow-title"></h2>
          <div class="record-slideshow-note" id="record-slideshow-note"></div>
          <div class="record-slideshow-background" id="record-slideshow-background" hidden>
            <p class="record-slideshow-background-title" id="record-slideshow-background-title"></p>
            <div id="record-slideshow-background-copy"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="/data/travel-record.js?v=20260510g"></script>
  <script src="/scripts/record-app.js?v=20260510g"></script>
</body>
</html>
