<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0e7490" />
  <title>アイスランド GW 2026 スポット詳細</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="stylesheet" href="/styles/site.css" />
  <link rel="stylesheet" href="/styles/journal.css" />
  <link rel="stylesheet" href="/styles/spots.css" />
</head>
<body>
  <main class="details-shell">
    <header class="details-hero">
      <div class="hero-copy">
        <p class="hero-eyebrow">アイスランド GW 2026</p>
        <h1>スポット詳細</h1>
        <p class="hero-lead">
          マップ上の各スポットを、旅程メモと成り立ちの説明つきで読みやすくまとめたページです。
          気になる場所から地図へ戻り、そのまま位置を確認できます。
        </p>
      </div>

      <div class="hero-meta">
        <p class="hero-meta-item" id="trip-period"></p>
        <p class="hero-meta-item" id="spot-count"></p>
      </div>

      <nav class="page-nav" aria-label="主要ページ">
        <a class="action-button secondary" href="/map">ルートマップ</a>
        <a class="action-button current" href="/spots" aria-current="page">スポット詳細</a>
        <a class="action-button secondary" href="/history">アイスランド史</a>
        <a class="action-button secondary" href="/record">旅の実記録</a>
      </nav>
    </header>

    <div class="details-layout">
      <nav class="spot-index" aria-label="スポット一覧">
        <div class="spot-index-panel">
          <details
            class="spot-index-disclosure"
            data-open-label="一覧を開く"
            data-close-label="一覧を閉じる"
          >
            <summary class="spot-index-summary">
              <span class="section-eyebrow">スポット一覧</span>
              <span class="spot-index-summary-copy">一覧を開く</span>
            </summary>
            <div class="spot-index-list" id="spot-index-list"></div>
          </details>
        </div>
      </nav>

      <section class="spot-groups" id="spot-groups"></section>
    </div>
  </main>

  <script src="/scripts/trip-shared.js"></script>
  <script src="/data/travel-record.js"></script>
  <script src="/data/journal-seed.js"></script>
  <script src="/scripts/journal-ui.js"></script>
  <script src="/data/route-data.js"></script>
  <script src="/scripts/spots-app.js"></script>
</body>
</html>
