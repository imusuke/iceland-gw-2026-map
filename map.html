<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0e7490" />
  <title>アイスランド GW 2026 ルートマップ</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="/styles/journal.css" />
  <link rel="stylesheet" href="/styles/map.css" />
</head>
<body>
  <main class="map-shell">
    <div id="map" aria-label="アイスランド旅行のルートマップ"></div>

    <section class="floating-panel top-right controls-stack">
      <div class="map-control-row map-action-buttons" aria-label="地図の操作">
        <button type="button" class="map-control-button" id="fullscreen-button">全画面</button>
        <button type="button" class="map-control-button" id="step-mode-toggle">ガイド</button>
      </div>

      <nav class="map-control-row map-page-links" aria-label="主要ページ">
        <span class="map-control-button map-control-current" aria-current="page">ルートマップ</span>
        <a class="map-control-button control-link" href="/spots">スポット詳細</a>
        <a class="map-control-button control-link" href="/history">アイスランド史</a>
        <a class="map-control-button control-link" href="/record">旅の実記録</a>
      </nav>

      <details class="map-mobile-nav">
        <summary class="map-control-button">ページ移動</summary>
        <nav class="map-mobile-nav-links" aria-label="主要ページ（モバイル）">
          <span class="map-control-button map-control-current" aria-current="page">ルートマップ</span>
          <a class="map-control-button control-link" href="/spots">スポット詳細</a>
          <a class="map-control-button control-link" href="/history">アイスランド史</a>
          <a class="map-control-button control-link" href="/record">旅の実記録</a>
        </nav>
      </details>
    </section>

    <section class="floating-panel bottom-right step-controls hidden" id="step-controls">
      <div class="step-controls-header">
        <p class="panel-title" id="step-progress-label">旅程 1 / 1</p>
        <div class="step-control-actions">
          <button type="button" class="map-control-button step-detail-toggle" id="step-detail-toggle">詳細</button>
          <button type="button" class="map-control-button step-journal-toggle" id="step-journal-button">旅の記録</button>
        </div>
      </div>
      <p class="step-current-stop" id="step-current-stop">スポット名</p>
      <div class="step-current-facts">
        <p class="step-current-meta step-current-pill" id="step-current-meta">到着・出発</p>
        <p class="step-current-travel step-current-pill" id="step-current-travel">移動目安</p>
      </div>
      <p class="step-current-note" id="step-current-note">メモ</p>
      <div class="step-nav-buttons">
        <button type="button" class="map-control-button" id="step-prev-button">前へ</button>
        <button type="button" class="map-control-button" id="step-next-button">次へ</button>
      </div>
    </section>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="/scripts/trip-shared.js?v=20260510c"></script>
  <script src="/data/travel-record.js?v=20260510c"></script>
  <script src="/data/journal-seed.js?v=20260510c"></script>
  <script src="/scripts/journal-ui.js?v=20260510c"></script>
  <script src="/data/route-data.js?v=20260510c"></script>
  <script src="/scripts/map-app.js?v=20260510c"></script>
</body>
</html>
