<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0e7490" />
  <title>Iceland GW 2026 Route Map</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="/styles/map.css" />
</head>
<body>
  <main class="map-shell">
    <div id="map" aria-label="Iceland trip route map"></div>

    <section class="floating-panel top-right controls-stack">
      <button type="button" class="map-control-button" id="fullscreen-button">Fullscreen</button>
      <button type="button" class="map-control-button" id="step-mode-toggle">Guide</button>
    </section>

    <section class="floating-panel bottom-right step-controls hidden" id="step-controls">
      <p class="panel-title" id="step-progress-label">Step 1 / 1</p>
    </section>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="/data/route-data.js"></script>
  <script src="/scripts/map-app.js"></script>
</body>
</html>
